			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -e\nMODEL_NAME=\"sherpa-onnx-streaming-paraformer-bilingual-zh-en\"\nMODEL_SRC=\"$PROJECT_DIR/Vendor/Models/$MODEL_NAME\"\nMODEL_DST=\"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/SherpaOnnxModels/$MODEL_NAME\"\nLIB_SRC=\"$PROJECT_DIR/Vendor/SherpaOnnxShared/lib\"\nLIB_DST=\"$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH\"\n\nif [ ! -f \"$MODEL_SRC/tokens.txt\" ] || [ ! -f \"$MODEL_SRC/encoder.int8.onnx\" ] || [ ! -f \"$MODEL_SRC/decoder.int8.onnx\" ]; then\n  echo \"error: Missing sherpa-onnx Paraformer model at $MODEL_SRC. Run scripts/setup_sherpa_onnx.sh from the repository root.\"\n  exit 1\nfi\n\nif [ ! -f \"$LIB_SRC/libsherpa-onnx-c-api.dylib\" ] || [ ! -f \"$LIB_SRC/libonnxruntime.1.24.4.dylib\" ]; then\n  echo \"error: Missing sherpa-onnx dylibs at $LIB_SRC. Run scripts/setup_sherpa_onnx.sh from the repository root.\"\n  exit 1\nfi\n\nmkdir -p \"$(dirname \"$MODEL_DST\")\" \"$LIB_DST\"\nrsync -a --delete \"$MODEL_SRC/\" \"$MODEL_DST/\"\nrsync -a \"$LIB_SRC/\" \"$LIB_DST/\"\n\n# Fix install names so dyld loads from @rpath (Frameworks) instead of absolute paths\nfor dylib in \"$LIB_DST\"/*.dylib; do\n  /usr/bin/install_name_tool -id \"@rpath/$(basename \"$dylib\")\" \"$dylib\" 2>/dev/null || true\ndone\n\nSIGN_IDENTITY=\"${EXPANDED_CODE_SIGN_IDENTITY:-}\"\nif [ -z \"$SIGN_IDENTITY\" ] || [ \"$SIGN_IDENTITY\" = \"-\" ]; then\n  SIGN_IDENTITY=\"-\"\nfi\nfind \"$LIB_DST\" -type f -name \"*.dylib\" -print0 | while IFS= read -r -d '' dylib; do\n  /usr/bin/codesign --force --sign \"$SIGN_IDENTITY\" --timestamp=none --options runtime \"$dylib\"\ndone\n";
		};
